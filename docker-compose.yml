version: '3.8'

services:
  db:
    image: postgres:15
    container_name: credit_system_db
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: credit_db
    ports:
      - "5432:5432"

  storage:
    image: minio/minio
    container_name: credit_system_storage
    restart: always
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"