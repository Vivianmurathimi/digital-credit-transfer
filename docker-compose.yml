version: '3.8'

services:
  postgres_db:
    image: postgres:15-alpine
    container_name: credit_system_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: supersecretpassword
      POSTGRES_DB: credit_transfer_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  minio_storage:
    image: minio/minio
    container_name: credit_system_storage
    restart: always
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: supersecretpassword
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000" 
      - "9001:9001" 
    volumes:
      - minio_data:/data

volumes:
  pgdata:
  minio_data: